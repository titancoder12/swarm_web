<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1220" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1623"/>
      <stop offset="1" stop-color="#081019"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#162335" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0E1724" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#69D3FF" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#69D3FF"/>
      <stop offset="1" stop-color="#C6FF5C"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1400" height="900" rx="36" fill="url(#bg)"/>
  <g opacity="0.18">
    <path d="M0 90H1400M0 180H1400M0 270H1400M0 360H1400M0 450H1400M0 540H1400M0 630H1400M0 720H1400M0 810H1400" stroke="#DCEBFF"/>
    <path d="M140 0V900M280 0V900M420 0V900M560 0V900M700 0V900M840 0V900M980 0V900M1120 0V900M1260 0V900" stroke="#DCEBFF"/>
  </g>

  <text x="88" y="102" fill="#EDF3F7" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="48" font-weight="700">Stigmergy: coordination through environmental memory</text>
  <text x="88" y="146" fill="#9FB2C8" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="24">Agents do not broadcast a global plan. They discover, return, deposit, and later reuse a shared route cue.</text>

  <rect x="86" y="205" width="1228" height="580" rx="32" fill="url(#panel)" stroke="#294159"/>

  <circle cx="242" cy="496" r="40" fill="#C6FF5C"/>
  <circle cx="242" cy="496" r="72" stroke="#C6FF5C" stroke-opacity="0.25" stroke-width="2"/>
  <text x="196" y="505" fill="#071018" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="22" font-weight="700">NEST</text>

  <circle cx="1118" cy="342" r="34" fill="#FFCB6B"/>
  <circle cx="1162" cy="606" r="28" fill="#FFCB6B"/>
  <text x="1056" y="285" fill="#FFCB6B" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="24" font-weight="700">Food sources</text>

  <rect x="628" y="322" width="84" height="160" rx="18" fill="#1B2B3F" stroke="#50728F"/>
  <rect x="796" y="430" width="92" height="132" rx="18" fill="#1B2B3F" stroke="#50728F"/>
  <rect x="928" y="252" width="76" height="140" rx="18" fill="#1B2B3F" stroke="#50728F"/>
  <text x="640" y="295" fill="#A4B5C8" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="22">Obstacles</text>

  <path d="M270 478C392 438 487 424 571 428C668 432 759 470 842 480C939 492 1033 453 1118 342" stroke="url(#trail)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M272 515C410 525 543 568 652 610C768 655 952 688 1162 606" stroke="#69D3FF" stroke-opacity="0.45" stroke-width="8" stroke-linecap="round" stroke-dasharray="10 16"/>

  <g>
    <circle cx="410" cy="428" r="15" fill="#69D3FF"/>
    <circle cx="410" cy="428" r="28" stroke="#69D3FF" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M430 414L462 390" stroke="#69D3FF" stroke-width="4" stroke-linecap="round"/>
    <text x="467" y="396" fill="#E7F8FF" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="24" font-weight="600">1. Explore and discover</text>
  </g>

  <g>
    <circle cx="712" cy="480" r="15" fill="#C6FF5C"/>
    <circle cx="712" cy="480" r="28" stroke="#C6FF5C" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M732 470L798 448" stroke="#C6FF5C" stroke-width="4" stroke-linecap="round"/>
    <text x="806" y="455" fill="#F4FFD4" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="24" font-weight="600">2. Return while depositing digital pheromone</text>
  </g>

  <g>
    <circle cx="904" cy="646" r="15" fill="#FFCB6B"/>
    <circle cx="904" cy="646" r="28" stroke="#FFCB6B" stroke-opacity="0.25" stroke-width="2"/>
    <path d="M882 634L820 600" stroke="#FFCB6B" stroke-width="4" stroke-linecap="round"/>
    <text x="570" y="602" fill="#FFE6B6" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="24" font-weight="600">3. Later agents sense the trail and reuse the route</text>
  </g>

  <g fill="#EDF3F7" font-family="SF Pro Display, Segoe UI, sans-serif" font-size="22">
    <text x="116" y="820">No central controller</text>
    <text x="470" y="820">Shared environmental memory</text>
    <text x="864" y="820">Collective route structure emerges</text>
  </g>
</svg>
